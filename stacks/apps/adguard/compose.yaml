services:
  adguard:
    image: adguard/adguardhome:latest
    container_name: adguard
    restart: unless-stopped
    network_mode: host
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${SERVICE_PATH:-/opt/apps}/adguard/config:/opt/adguardhome/conf
      - ${SERVICE_PATH:-/opt/apps}/adguard/data:/opt/adguardhome/work
