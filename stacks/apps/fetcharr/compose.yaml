services:
  fetcharr:
    image: egg82/fetcharr:latest
    container_name: fetcharr
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - proxy
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${SERVICE_PATH:-/opt/apps}/fetcharr/config:/app/config
      - ${SERVICE_PATH:-/opt/apps}/fetcharr/cache:/app/cache
      - ${SERVICE_PATH:-/opt/apps}/fetcharr/logs:/app/logs
      - ${SERVICE_PATH:-/opt/apps}/fetcharr/plugins:/app/plugins    

networks:
  proxy:
    external: true