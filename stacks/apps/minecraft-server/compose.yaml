services:
  minecraft-server:
    image: itzg/minecraft-bedrock-server:latest
    container_name: minecraft-server
    mem_limit: 8g
    mem_reservation: 2g
    restart: unless-stopped
    networks:
      - gaming
    ports:
      - 19132:19132/tcp
      - 19132:19132/udp
    environment:
      EULA: true
      DIFFICULTY: peaceful
      GAMEMODE: creative
      ONLINE_MODE: false
      DEFAULT_PLAYER_PERMISSION_LEVEL: operator
      ALLOW_CHEATS: true
      SERVER_PORT: 19132
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ${SERVICE_PATH:-/opt/apps}/minecraft-server/config:/config
      - ${SERVICE_PATH:-/opt/apps}/minecraft-server/data:/data

networks:
  gaming:
    external: true
