services:
  beszel:
    image: henrygd/beszel-agent-intel:0.18.7
    container_name: beszel-agent
    restart: unless-stopped
    cap_add:
    - CAP_PERFMON
    devices:
      - /dev/dri/card0:/dev/dri/card0
    env_file:
      - .env
    network_mode: host
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/core/beszel-agent/data:/var/lib/beszel-agent
